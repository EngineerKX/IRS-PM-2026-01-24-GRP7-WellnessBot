protocol_id: PROTO_KNEE_ARTHRO_V3
surgery_type: arthroscopic_knee_surgery
version: "3.0"

procedure:
  procedure_id: PROC_KNEE_ARTHRO
  procedure_name: Arthroscopic knee surgery
  body_region: knee

phases:
  - phase_id: P1_1
    name: Initial
    week_min: 0
    week_max: 2
    source_id: S1
    phase_goal:
      - Protect repair
      - Reduce swelling, minimize pain
      - Restore patellar mobility
      - Restore full extension
      - Flexion <90 degrees
      - Minimize arthrogenic muscle inhibition, re-establish quad control, regain full active extension

  - phase_id: P1_2
    name: Early
    week_min: 2
    week_max: 4
    source_id: S1
    phase_goal:
      - Protect repair
      - Reduce swelling, minimize pain
      - Restore patellar mobility
      - Restore full extension
      - Flexion <90 degrees
      - Minimize arthrogenic muscle inhibition, re-establish quad control, regain full active extension

  - phase_id: P2
    name: Intermediate
    week_min: 4
    week_max: 6
    source_id: S1
    phase_goal:
      - Continue to protect repair
      - Reduce pain, minimize swelling
      - Maintain full extension
      - Flexion >90 degrees unless further direction from MD

  - phase_id: P3
    name: Late
    week_min: 6
    week_max: 10
    source_id: S1
    phase_goal:
      - Continue to protect repair
      - Maintain full extension
      - Normalize gait
      - Flexion within 10 degrees of contralateral side
      - Safely progress strengthening
      - Promote proper movement patterns
      - Avoid post exercise pain/swelling

  - phase_id: P4
    name: Transitional
    week_min: 10
    week_max: 13
    source_id: S1
    phase_goal:
      - Maintain full ROM
      - Safely progress strengthening
      - Promote proper movement patterns
      - Avoid post exercise pain/swelling

  - phase_id: P5
    name: Return to sport
    week_min: 13
    week_max: 21
    source_id: S1
    phase_goal:
      - Safely progress strengthening
      - Safely initiate sports specific training program
      - Promote proper movement patterns
      - Avoid post exercise pain/swelling

exercise_aliases:
  ankle pumps: P1_1_E1
  heel slides: P1_1_E2
  seated passive knee flexion: P1_1_E3
  quadriceps setting: P1_1_E4

  terminal knee extension: P1_2_E1
  knee flexion and extension: P1_2_E2
  straight leg raises: P1_2_E3
  hip abduction: P1_2_E4

  calf raises: P2_E1
  bridges: P2_E2
  stationary bicycle: P2_E3
  double limb standing balance: P2_E4

  quadriceps stretch standing: P3_E1
  hamstring stretch supine: P3_E2
  partial squat with chair: P3_E3
  standing hamstring curl: P3_E4
  hip abduction standing: P3_E5
  hip extension standing: P3_E6
  wall slides: P3_E7

  step ups forwards: P4_E1
  step ups lateral: P4_E2
  lunges: P4_E3
  step downs: P4_E4
  single leg squats: P4_E5
  leg presses: P4_E6

sources:
  S1: https://www.massgeneral.org/assets/MGH/pdf/orthopaedics/sports-medicine/physical-therapy/rehabilitation-protocol-for-meniscus-repair.pdf
  S2: https://www.melbournehipandknee.com.au/pdf/knee-arthroscopy-rehabilitation-protocol.pdf
  S3: https://sportmed.com/wp-content/uploads/Knee_scope_11.pdf
  S4: https://sportmed.com/wp-content/uploads/Knee_Scope_21.pdf
  S5: https://hamishlove.nz/wp-content/uploads/2017/10/SSO-Knee-Initial-post-op-rehab.pdf
  S6: https://banffsportmed.ca/wp-content/uploads/2025/06/Post-Op-Rehab-Scope-May-2012.pdf
  S7: https://jaredleemd.com/wp-content/uploads/2025/06/Post-op-Knee-Arthroscopy-Home-Exercise-Program.pdf
  S8: https://orthoinfo.aaos.org/globalassets/pdfs/2023-rehab_knee_10-16-23.pdf
  S9: http://www.kneeclinic.info/download/CKCGHKneeArthroscopyExercises040612.pdf
  S10: https://hipkneeinfo.org/wp-content/uploads/2025/09/knee-exercises-print-guide.pdf
  S11: https://www.orthowood.com/uploads/2014/01/Knee-Replacement-Rehabilitation.pdf

redflag_policies:
  - redflag_id: RF_001
    phase_ids: [P1_1]
    symptom: fever
    action: supportive_sequence
    action_steps:
      - prescribed_medicine_reminder
      - stop_exercise

  - redflag_id: RF_002
    phase_ids: [P1_2, P2, P3, P4]
    symptom: fever
    action: escalate

  - redflag_id: RF_003
    phase_ids: [P1_1, P1_2, P2, P3, P4, P5]
    symptom: excessive_bleeding_or_wound_drainage
    action: escalate

  - redflag_id: RF_004
    phase_ids: [P1_1]
    symptom: pain
    severity: 1
    action: supportive_sequence
    action_steps:
      - prescribed_medicine_reminder
      - exercise_downgrade

  - redflag_id: RF_005
    phase_ids: [P1_1]
    symptom: pain
    severity: 2
    action: supportive_sequence
    action_steps:
      - prescribed_medicine_reminder
      - stop_exercise

  - redflag_id: RF_006
    phase_ids: [P1_2, P2, P3, P4]
    symptom: pain
    severity: 1
    action: supportive_sequence
    action_steps:
      - pain_killer
      - exercise_downgrade

  - redflag_id: RF_007
    phase_ids: [P1_2, P2, P3, P4]
    symptom: pain
    severity: 2
    action: supportive_sequence
    action_steps:
      - pain_killer
      - stop_exercise

  - redflag_id: RF_008
    phase_ids: [P1_1, P1_2, P2, P3, P4, P5]
    symptom: pain
    severity: 3
    action: escalate

  - redflag_id: RF_009
    phase_ids: [P1_1, P1_2, P2, P3, P4, P5]
    symptom: swelling
    severity: 3
    action: escalate

selfcare_actions:
