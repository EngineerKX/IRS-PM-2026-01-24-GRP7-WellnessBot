protocol_id: PROTO_KNEE_ARTHRO_V1
event_type: meniscus
version: "1.0"

phases:
  - phase_id: P_KNEE_01
    name: Early Phase
    week_min: 0
    week_max: 2

  - phase_id: P_KNEE_02
    name: Intermediate Phase
    week_min: 2
    week_max: 6

  - phase_id: P_KNEE_03
    name: Late Phase
    week_min: 6
    week_max: 9

  - phase_id: P_KNEE_04
    name: Transitional Phase
    week_min: 9
    week_max: 12

  - phase_id: P_KNEE_05
    name: Return to Sport
    week_min: 12
    week_max: 20

exercise_aliases:

    ankle pumps: E_ANKLE_PUMPS
    ankle pumps circulation: E_ANKLE_PUMPS_CIRCULATION

    knee locking: E_KNEE_LOCKING

    quadriceps setting: E_QUADRICEPS_SETTING

    straight leg raises: E_STRAIGHT_LEG_RAISE

    flexion straight leg raises: E_FLEXION_STRAIGHT_LEG_RAISE

    heel slides lying: E_HEEL_SLIDES_LYING
    heel slides sitting: E_HEEL_SLIDES_SITTING

    knee bending: E_KNEE_BENDING

    seated passive knee flexion: E_PASSIVE_KNEE_FLEXION_SEATED

    terminal knee extension: E_TERMINAL_KNEE_EXTENSION
    tke: E_TERMINAL_KNEE_EXTENSION

    short arc lift: E_SHORT_ARC_LIFT

    hip abduction: E_HIP_ABDUCTION
    hip abduction band: E_HIP_ABDUCTION_BAND

    calf raises: E_CALF_RAISES

    standing toe raise: E_TOE_RAISES

    standing hamstring curl: E_STANDING_HAMSTRING_CURL

    hamstring curls: E_HAMSTRING_CURL

    partial squat with chair: E_PARTIAL_SQUAT_CHAIR

    mini squat: E_MINI_SQUAT


